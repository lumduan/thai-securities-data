name: Update Thai Securities Data

on:
  schedule:
    - cron: '0 0 * * 1-5'     # 07:00 ICT (00:00 UTC), Mon–Fri
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Run update script
        env:
          DATA_DIR: .
          LOG_LEVEL: INFO
        run: uv run python scripts/update_securities.py

      - name: Update README timestamp
        run: |
          TODAY=$(date -u '+%Y-%m-%d')
          sed -i "s/Last Repository Update**: [0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}/Last Repository Update**: $TODAY/g" README.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.json README.md
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "🌐 Automated multilingual securities data update: $(date -u '+%Y-%m-%d %H:%M:%S')"
          git push
